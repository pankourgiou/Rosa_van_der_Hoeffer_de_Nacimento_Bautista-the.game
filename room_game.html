<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --neon: #b06aff;
    --gold: #ffd166;
    --cyan: #06d6a0;
    --red: #ef476f;
    --bg: #0d0d1a;
    --panel: rgba(20,20,40,0.92);
    --glow: 0 0 18px #b06aff88;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); font-family: 'Rajdhani', sans-serif; color: #e0e0ff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-x: hidden; }
  header { width: 100%; text-align: center; padding: 22px 0 8px; letter-spacing: 0.22em; }
  header h1 { font-family: 'Orbitron', monospace; font-size: 1.45rem; font-weight: 900; color: var(--neon); text-shadow: var(--glow); text-transform: uppercase; }
  header p { font-size: 0.92rem; color: #888aaa; margin-top: 3px; letter-spacing: 0.12em; }
  .hud { display: flex; gap: 28px; align-items: center; justify-content: center; padding: 10px 28px; background: var(--panel); border: 1px solid #2a2a5a; border-radius: 10px; margin: 12px 0 16px; box-shadow: var(--glow); flex-wrap: wrap; }
  .hud-item { text-align: center; }
  .hud-label { font-size: 0.65rem; letter-spacing: 0.18em; color: #666890; text-transform: uppercase; }
  .hud-value { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700; color: var(--gold); }
  #combo-val { color: var(--cyan); } #found-val { color: var(--neon); }
  .scene { position: relative; width: min(820px, 96vw); aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; border: 2px solid #2a2a5a; box-shadow: 0 0 40px #b06aff33, 0 8px 40px #00000088; cursor: crosshair; }
  .scene img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-line { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--neon), transparent); animation: scan 3.2s linear infinite; pointer-events: none; opacity: 0.45; }
  @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
  .corner { position: absolute; width: 28px; height: 28px; border-color: var(--neon); border-style: solid; opacity: 0.7; pointer-events: none; }
  .corner.tl { top: 8px; left: 8px; border-width: 3px 0 0 3px; }
  .corner.tr { top: 8px; right: 8px; border-width: 3px 3px 0 0; }
  .corner.bl { bottom: 8px; left: 8px; border-width: 0 0 3px 3px; }
  .corner.br { bottom: 8px; right: 8px; border-width: 0 3px 3px 0; }

  /* FAIRY */
  #fairy {
    position: absolute;
    width: 48px;
    height: 48px;
    pointer-events: none;
    z-index: 50;
    transform: translate(-50%, -50%);
    transition: transform 0.1s;
    filter: drop-shadow(0 0 8px #ffe0ff) drop-shadow(0 0 3px #fff);
  }
  #fairy svg { width: 100%; height: 100%; }

  /* fairy trail sparkles */
  .sparkle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 49;
    animation: sparkle-fade 0.8s ease-out forwards;
  }
  @keyframes sparkle-fade {
    0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0); }
  }

  /* fairy exclamation on hover hotspot */
  .fairy-exclaim {
    position: absolute;
    font-size: 1.2rem;
    pointer-events: none;
    z-index: 55;
    animation: exclaim 0.6s ease-out forwards;
    transform: translate(-50%, -100%);
    filter: drop-shadow(0 0 6px gold);
  }
  @keyframes exclaim {
    0%   { opacity: 0; transform: translate(-50%, -100%) scale(0.5); }
    40%  { opacity: 1; transform: translate(-50%, -160%) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -200%) scale(1); }
  }

  /* Hotspots */
  .hotspot { position: absolute; transform: translate(-50%, -50%); cursor: pointer; z-index: 10; }
  .hotspot .ring { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--neon); background: rgba(176,106,255,0.13); display: flex; align-items: center; justify-content: center; animation: pulse 2s ease-in-out infinite; transition: background 0.2s, border-color 0.2s, transform 0.15s; position: relative; }
  .hotspot:hover .ring { background: rgba(176,106,255,0.35); border-color: var(--gold); transform: scale(1.18); }
  .hotspot.found .ring { border-color: var(--cyan); background: rgba(6,214,160,0.25); animation: none; }
  .hotspot .ring::after { content: '?'; font-family: 'Orbitron', monospace; font-size: 0.85rem; font-weight: 700; color: var(--neon); }
  .hotspot.found .ring::after { content: '✓'; color: var(--cyan); }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(176,106,255,0.5); } 50% { box-shadow: 0 0 0 10px rgba(176,106,255,0); } }
  .hotspot .tip { position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%); background: var(--panel); border: 1px solid var(--neon); border-radius: 8px; padding: 8px 14px; width: max-content; max-width: 180px; font-size: 0.82rem; color: #ccd; pointer-events: none; opacity: 0; transition: opacity 0.18s; text-align: center; box-shadow: var(--glow); z-index: 20; line-height: 1.4; }
  .hotspot .tip strong { display: block; font-family: 'Orbitron', monospace; font-size: 0.7rem; color: var(--gold); margin-bottom: 3px; letter-spacing: 0.1em; }
  .hotspot:hover .tip { opacity: 1; }
  .burst { position: absolute; width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, var(--neon) 0%, transparent 70%); transform: translate(-50%, -50%) scale(0); pointer-events: none; animation: burst 0.5s ease-out forwards; z-index: 30; }
  @keyframes burst { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }
  .float-score { position: absolute; font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 700; color: var(--gold); text-shadow: 0 0 10px var(--gold); pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 40; white-space: nowrap; }
  @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) translateX(-50%); } 100% { opacity: 0; transform: translateY(-60px) translateX(-50%); } }
  .progress-wrap { width: min(820px, 96vw); margin-top: 14px; background: #1a1a30; border-radius: 6px; height: 8px; border: 1px solid #2a2a5a; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--neon), var(--cyan)); border-radius: 6px; transition: width 0.4s cubic-bezier(.4,0,.2,1); box-shadow: 0 0 10px var(--neon); width: 0%; }
  .message { margin-top: 14px; padding: 10px 22px; background: var(--panel); border: 1px solid #2a2a5a; border-radius: 8px; font-size: 0.9rem; color: #aab; min-height: 38px; text-align: center; letter-spacing: 0.06em; transition: all 0.3s; width: min(820px, 96vw); margin-bottom: 20px; }
  .message.highlight { border-color: var(--gold); color: var(--gold); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--panel); border: 2px solid var(--neon); border-radius: 16px; padding: 40px 50px; text-align: center; box-shadow: 0 0 60px #b06aff55; animation: popIn 0.4s cubic-bezier(.4,0,.2,1); }
  @keyframes popIn { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .modal h2 { font-family: 'Orbitron', monospace; font-size: 1.6rem; color: var(--gold); text-shadow: 0 0 20px var(--gold); margin-bottom: 10px; }
  .modal p { color: #ccd; margin-bottom: 6px; font-size: 1rem; }
  .modal .final-score { font-family: 'Orbitron', monospace; font-size: 2.5rem; color: var(--neon); text-shadow: var(--glow); margin: 12px 0; }
  .modal button { margin-top: 18px; padding: 12px 32px; font-family: 'Orbitron', monospace; font-size: 0.85rem; background: transparent; border: 2px solid var(--neon); color: var(--neon); border-radius: 8px; cursor: pointer; letter-spacing: 0.15em; transition: background 0.2s, color 0.2s; }
  .modal button:hover { background: var(--neon); color: #0d0d1a; }
</style>
</head>

      <circle cx="26" cy="19" r="1" fill="#5a2e8a"/>
      <!-- smile -->
      <path d="M21.5 22 Q24 24 26.5 22" stroke="#c060d0" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      <!-- wand -->
      <line x1="29" y1="24" x2="38" y2="14" stroke="#ffd166" stroke-width="1.2" stroke-linecap="round"/>
      <polygon points="38,14 40,11 42,14 39,16" fill="#ffd166" opacity="0.95"/>
      <circle cx="38" cy="14" r="2.2" fill="white" opacity="0.9"/>
    </svg>
  </div>
</div>
<div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
<div class="message" id="message">🧚 The fairy is searching the room for hidden treasures…</div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>ROOM CLEARED!</h2>
    <p>All objects discovered</p>
    <div class="final-score" id="final-score">0</div>
    <p id="final-msg"></p>
    <button onclick="resetGame()">PLAY AGAIN</button>
  </div>
</div>

<script>
const HOTSPOTS = [
  { id: 'sofa',     x: 52, y: 68, name: 'Leather Sofa',     desc: 'A sleek black leather sofa — perfect for late-night reading.', pts: 120 },
  { id: 'lamp',     x: 37, y: 52, name: 'Floor Lamp',       desc: 'Warm amber glow. Someone left it on.',                         pts: 80  },
  { id: 'art',      x: 68, y: 32, name: 'Lavender Canvas',  desc: 'A vibrant purple field — smells imaginary.',                   pts: 150 },
  { id: 'tree',     x: 14, y: 58, name: 'Bike-Wheel Tree',  desc: 'A tree mural made entirely of bicycle wheels.',                pts: 200 },
  { id: 'plant1',   x: 31, y: 72, name: 'Fiddle Leaf Fig',  desc: 'A healthy plant. Watered recently.',                          pts: 90  },
  { id: 'plant2',   x: 86, y: 75, name: 'ZZ Plant',         desc: 'Nearly indestructible. A true survivor.',                     pts: 90  },
  { id: 'aircon',   x: 63, y: 10, name: 'AC Unit',          desc: 'Whisper-quiet climate control. Set to 22°C.',                 pts: 70  },
  { id: 'painting', x: 10, y: 32, name: 'Framed Artwork',   desc: 'Two dancers frozen in time. Who are they?',                   pts: 110 },
];

let score = 0, combo = 1, found = 0, timeLeft = 60, timerInterval;
const total = HOTSPOTS.length;

// ── Fairy state ──
const fairy = document.getElementById('fairy');
const scene = document.getElementById('scene');
let fairyX = 50, fairyY = 50;        // % within scene
let targetX = 50, targetY = 50;
let fairyFlipX = 1;
let visitQueue = [];                  // hotspots to visit in order
let visitIndex = 0;
let idleTimer = 0;
let sparkleInterval;
let fairyFrame = 0;
let bobAngle = 0;

function buildVisitQueue() {
  // shuffle unfound hotspots
  const unfound = HOTSPOTS.filter(h => !document.getElementById('hs-'+h.id)?.classList.contains('found'));
  visitQueue = [...unfound].sort(() => Math.random() - 0.5);
  visitIndex = 0;
}

function nextTarget() {
  if (visitQueue.length === 0) buildVisitQueue();
  if (visitQueue.length === 0) return;
  const h = visitQueue[visitIndex % visitQueue.length];
  visitIndex++;
  // add slight random offset so fairy hovers near but not exactly on dot
  targetX = h.x + (Math.random() - 0.5) * 8;
  targetY = h.y + (Math.random() - 0.5) * 8;
  targetX = Math.max(5, Math.min(95, targetX));
  targetY = Math.max(5, Math.min(95, targetY));
}

function spawnSparkle(px, py) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  const size = 3 + Math.random() * 5;
  const colors = ['#ffd166','#b06aff','#fff','#06d6a0','#ffaaff'];
  s.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+px+'%;top:'+py+'%;background:'+colors[Math.floor(Math.random()*colors.length)]+';';
  scene.appendChild(s);
  setTimeout(() => s.remove(), 800);
}

function fairyExclaim(px, py) {
  const e = document.createElement('div');
  e.className = 'fairy-exclaim';
  e.textContent = '✨';
  e.style.left = px + '%';
  e.style.top = py + '%';
  scene.appendChild(e);
  setTimeout(() => e.remove(), 700);
}

function animateFairy() {
  bobAngle += 0.06;
  const bob = Math.sin(bobAngle) * 1.2; // gentle vertical bob in %

  const dx = targetX - fairyX;
  const dy = targetY - fairyY;
  const dist = Math.sqrt(dx*dx + dy*dy);

  const speed = 0.35;
  if (dist > 0.4) {
    fairyX += (dx / dist) * Math.min(speed, dist);
    fairyY += (dy / dist) * Math.min(speed * 0.7, dist);
    // flip direction
    if (dx < 0) fairyFlipX = -1;
    else fairyFlipX = 1;
  } else {
    idleTimer++;
    if (idleTimer > 80) {
      idleTimer = 0;
      // emit exclaim near current hotspot
      fairyExclaim(fairyX, fairyY - 5);
      nextTarget();
    }
  }

  fairy.style.left = fairyX + '%';
  fairy.style.top = (fairyY + bob) + '%';
  fairy.style.transform = 'translate(-50%,-50%) scaleX(' + fairyFlipX + ')';

  // sparkle trail every ~4 frames
  fairyFrame++;
  if (fairyFrame % 4 === 0) {
    spawnSparkle(fairyX + (Math.random()-0.5)*3, fairyY + (Math.random()-0.5)*3);
  }

  requestAnimationFrame(animateFairy);
}

// ── Game logic ──
function init() {
  scene.querySelectorAll('.hotspot,.burst,.float-score,.sparkle,.fairy-exclaim').forEach(e => e.remove());
  HOTSPOTS.forEach(h => {
    const el = document.createElement('div');
    el.className = 'hotspot';
    el.id = 'hs-' + h.id;
    el.style.left = h.x + '%';
    el.style.top = h.y + '%';
    el.innerHTML = '<div class="ring"></div><div class="tip"><strong>' + h.name + '</strong>' + h.desc + '</div>';
    el.addEventListener('click', (e) => onClick(e, h, el));
    scene.appendChild(el);
  });
  // re-append fairy so it stays on top
  scene.appendChild(fairy);

  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('message').textContent = '🧚 The fairy is searching the room for hidden treasures…';
  document.getElementById('message').classList.remove('highlight');
  clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
  buildVisitQueue();
  nextTarget();
}

function tick() {
  timeLeft--;
  document.getElementById('timer-val').textContent = timeLeft;
  if (timeLeft <= 10) document.getElementById('timer-val').style.color = 'var(--red)';
  if (timeLeft <= 0) { clearInterval(timerInterval); endGame(false); }
}

function onClick(e, h, el) {
  if (el.classList.contains('found')) return;
  el.classList.add('found');
  found++;
  const pts = h.pts * combo;
  score += pts;
  combo = Math.min(combo + 1, 5);
  document.getElementById('score-val').textContent = score;
  document.getElementById('combo-val').textContent = 'x' + combo;
  document.getElementById('found-val').textContent = found + ' / ' + total;
  document.getElementById('progress-bar').style.width = (found / total * 100) + '%';

  const rect = scene.getBoundingClientRect();
  const burst = document.createElement('div');
  burst.className = 'burst';
  burst.style.left = (e.clientX - rect.left) + 'px';
  burst.style.top = (e.clientY - rect.top) + 'px';
  scene.appendChild(burst);
  setTimeout(() => burst.remove(), 500);

  const fs = document.createElement('div');
  fs.className = 'float-score';
  fs.textContent = '+' + pts;
  fs.style.left = h.x + '%';
  fs.style.top = (h.y - 3) + '%';
  scene.appendChild(fs);
  setTimeout(() => fs.remove(), 1000);

  const msg = document.getElementById('message');
  msg.textContent = '🧚 ' + h.name + ' discovered! — ' + h.desc + (combo > 1 ? '  [COMBO x' + combo + '!]' : '');
  msg.classList.add('highlight');
  setTimeout(() => msg.classList.remove('highlight'), 900);

  // send fairy toward next target
  buildVisitQueue();
  nextTarget();

  if (found === total) { clearInterval(timerInterval); setTimeout(() => endGame(true), 600); }
}

function endGame(win) {
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-msg').textContent = win
    ? 'You found everything with ' + timeLeft + 's left! Incredible.'
    : "Time's up! You found " + found + ' of ' + total + ' objects.';
  document.getElementById('modal').classList.add('show');
}

function resetGame() {
  score = 0; combo = 1; found = 0; timeLeft = 60;
  document.getElementById('score-val').textContent = 0;
  document.getElementById('combo-val').textContent = 'x1';
  document.getElementById('found-val').textContent = '0 / ' + total;
  document.getElementById('timer-val').textContent = 60;
  document.getElementById('timer-val').style.color = '';
  document.getElementById('modal').classList.remove('show');
  init();
}

init();
animateFairy();
</script>
</body>
</html>
